        let currentQuestion = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

        function startTest() {
            document.getElementById('start-page').classList.remove('active');
            document.getElementById('question-page').classList.add('active');
            showQuestion();
        }

        function showQuestion() {
            const question = questions[currentQuestion];
            const container = document.getElementById('question-container');
            container.innerHTML = `
                <div class="question">
                    <h2>${question.question}</h2>
                    <div class="options">
                        ${question.options.map((option, index) => `
                            <div class="option" onclick="selectOption('${option.type}', ${index})">${option.text}</div>
                        `).join('')}
                    </div>
                </div>
            `;
            updateProgress();
        }

        function selectOption(type, index) {
            scores[type]++;
            currentQuestion++;
            if (currentQuestion < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function updateProgress() {
            const progress = (currentQuestion / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }

        function showResult() {
            document.getElementById('question-page').classList.remove('active');
            document.getElementById('result-page').classList.add('active');

            const type = calculateType();
            const result = results[type];

            document.getElementById('result-title').textContent = result.title;
            document.getElementById('result-description').textContent = result.description;

            const detailsContainer = document.getElementById('result-details');
            detailsContainer.innerHTML = Object.entries(result.details).map(([key, value]) => `
                <div class="detail-item">
                    <span class="detail-label">${key}:</span> ${value}
                </div>
            `).join('');
        }

        function calculateType() {
            const ei = scores.E > scores.I ? 'E' : 'I';
            const sn = scores.S > scores.N ? 'S' : 'N';
            const tf = scores.T > scores.F ? 'T' : 'F';
            const jp = scores.J > scores.P ? 'J' : 'P';
            return ei + sn + tf + jp;
        }

        function restartTest() {
            currentQuestion = 0;
            scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
            document.getElementById('result-page').classList.remove('active');
            document.getElementById('start-page').classList.add('active');
        }
    </script>
